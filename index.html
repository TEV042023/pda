<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDA Assessment</title>
    <meta name="description" content="Plataforma PDA Assessment.">
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1046/1046261.png" type="image/x-icon">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f3f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #2c3e50;
        }

        .loader-container {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #34495e;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        a {
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
        }
        
        a:hover {
            text-decoration: underline;
        }
    </style>

    <script>
        // Executa o redirecionamento assim que a página começa a carregar
        window.location.href = "https://script.google.com/macros/s/AKfycbyL2kx3-gv8Oxdg72SqsXIW6Nza4bDt9uKjOwh0IysL/exec?acao=pda";
    </script>
</head>
<body>

    <div class="loader-container">
        <div class="spinner"></div>
        <h2>Carregando o PDA Assessment...</h2>
        <p>Se você não for redirecionado automaticamente, <a href="https://script.google.com/macros/s/AKfycbyL2kx3-gv8Oxdg72SqsXIW6Nza4bDt9uKjOwh0IysL/exec?acao=pda">clique aqui para acessar</a>.</p>
    </div>

</body>
</html>
